<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dictation Deck</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="deck">
      <section class="player">
        <a class="back" href="../">All variations</a>
        <p class="eyebrow">Variation 2</p>
        <h1>Dictation Deck</h1>
        <p class="lead">
          A more focused layout for repeating one sentence at a time.
        </p>

        <div class="playback">
          <p class="label">Current sentence</p>
          <blockquote id="current-text">Choose a sentence to start slow playback.</blockquote>
          <div class="meter">
            <span>Speed</span>
            <input id="rate-input" type="range" min="0.4" max="0.95" step="0.05" value="0.6" />
            <strong id="rate-output">0.60x</strong>
          </div>
          <div class="meter">
            <span>Voice</span>
            <select id="voice-select"></select>
          </div>
          <div class="hero-actions">
            <button id="play-current">Play selected sentence</button>
            <button class="secondary" id="stop-current">Stop</button>
          </div>
        </div>

        <form id="sentence-form" class="composer">
          <label for="sentence-input">Add a custom sentence</label>
          <textarea id="sentence-input" rows="4" placeholder="Ich moechte diesen Satz mehrmals langsam hoeren."></textarea>
          <button type="submit">Store in browser</button>
        </form>
      </section>

      <section class="queue">
        <div class="queue-head">
          <h2>Sentence Queue</h2>
          <p>Built-in and user sentences appear together here.</p>
        </div>
        <div id="sentence-list" class="queue-list" aria-live="polite"></div>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
  </html>
