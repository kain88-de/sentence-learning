<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reading Room</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <a class="back" href="../">All variations</a>
        <div>
          <p class="eyebrow">Variation 1</p>
          <h1>Reading Room</h1>
          <p class="intro">
            Browse German sentences, play them slowly, and save your own
            practice lines in the browser.
          </p>
        </div>
      </header>

      <section class="controls panel">
        <div class="control">
          <label for="voice-select">German voice</label>
          <select id="voice-select"></select>
        </div>
        <div class="control">
          <label for="rate-input">Playback speed</label>
          <input id="rate-input" type="range" min="0.4" max="0.95" step="0.05" value="0.65" />
          <span id="rate-output">0.65x</span>
        </div>
      </section>

      <section class="composer panel">
        <div>
          <h2>Add your own sentence</h2>
          <p>Saved locally with IndexedDB and shared across all three variations.</p>
        </div>
        <form id="sentence-form">
          <textarea id="sentence-input" rows="3" placeholder="Zum Beispiel: Ich schreibe das Diktat heute ganz langsam mit."></textarea>
          <button type="submit">Save sentence</button>
        </form>
      </section>

      <section class="list" id="sentence-list" aria-live="polite"></section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
  </html>
